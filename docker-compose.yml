# =============================================================================
# AnonLFI - Docker Compose Configuration
# =============================================================================
#
# This configuration implements a modular, lazy-loading architecture where
# services and models are only provisioned when needed.
#
# Profiles:
#   default     - Basic anonymization (no SLM)
#   slm         - Includes Ollama for SLM features
#   gpu         - GPU-accelerated version with Ollama
#
# Usage:
#   # Basic usage (CPU, no SLM)
#   docker-compose run --rm anon input.txt
#
#   # With SLM support
#   docker-compose --profile slm up -d ollama
#   docker-compose --profile slm run --rm anon input.txt --slm-map-entities
#
#   # GPU-accelerated
#   docker-compose --profile gpu up -d
#   docker-compose --profile gpu run --rm anon-gpu input.txt
#
#   # Process a file
#   docker-compose run --rm anon /data/input/myfile.json --output-dir /data/output
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # AnonLFI - Main Application (CPU)
  # ---------------------------------------------------------------------------
  anon:
    build:
      context: .
      target: production
    image: anon:latest
    container_name: anon
    environment:
      - ANON_SECRET_KEY=${ANON_SECRET_KEY:-change-me-in-production}
      - ANON_LAZY_LOADING=1
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      # Preload specific models if needed (comma-separated)
      # Example: ANON_PRELOAD=en_core_web_lg,transformer:Davlan/xlm-roberta-base-ner-hrl
      - ANON_PRELOAD=${ANON_PRELOAD:-}
    volumes:
      # Persistent storage for ML models (survives container restarts)
      - anon-models:/app/models
      # Output directory
      - anon-output:/app/output
      # Database for entity mappings
      - anon-db:/app/db
      # Input data (mount your data directory here)
      - ${DATA_DIR:-./data}:/data:ro
    networks:
      - anon-network
    # Don't start automatically - this is a CLI tool
    profiles:
      - default
      - slm
    depends_on:
      ollama:
        condition: service_started
        required: false

  # ---------------------------------------------------------------------------
  # AnonLFI - GPU-Accelerated Version
  # ---------------------------------------------------------------------------
  anon-gpu:
    build:
      context: .
      target: gpu
    image: anon:gpu
    container_name: anon-gpu
    environment:
      - ANON_SECRET_KEY=${ANON_SECRET_KEY:-change-me-in-production}
      - ANON_LAZY_LOADING=1
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3}
      - ANON_PRELOAD=${ANON_PRELOAD:-}
    volumes:
      - anon-models:/app/models
      - anon-output:/app/output
      - anon-db:/app/db
      - ${DATA_DIR:-./data}:/data:ro
    networks:
      - anon-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu
    depends_on:
      ollama:
        condition: service_healthy
        required: false

  # ---------------------------------------------------------------------------
  # Ollama - Local LLM Service
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      # Persistent storage for Ollama models
      - ollama-models:/root/.ollama
    networks:
      - anon-network
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    profiles:
      - slm
      - gpu

  # ---------------------------------------------------------------------------
  # Ollama GPU - GPU-Accelerated Ollama
  # ---------------------------------------------------------------------------
  ollama-gpu:
    image: ollama/ollama:latest
    container_name: ollama-gpu
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - anon-network
    environment:
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    profiles:
      - gpu

# =============================================================================
# Networks
# =============================================================================
networks:
  anon-network:
    driver: bridge
    name: anon-network

# =============================================================================
# Volumes - Persistent Storage
# =============================================================================
volumes:
  # ML models (spaCy, transformers) - shared between CPU and GPU versions
  anon-models:
    name: anon-models

  # Anonymization output files
  anon-output:
    name: anon-output

  # SQLite database for entity tracking
  anon-db:
    name: anon-db

  # Ollama models (llama3, etc.)
  ollama-models:
    name: ollama-models
