# Development Docker Compose — hot-reload, no heavy OCR engines.
# Usage (from web/):
#   docker compose -f docker-compose.dev.yml up --build
#
# Frontend: http://localhost:5173
# Backend API docs: http://localhost:8000/api/docs

services:

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: web/backend/Dockerfile.dev
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ../src:/app/src:ro
      - ../anon.py:/app/anon.py:ro
      - ./backend/main.py:/app/main.py:ro
      - ./backend/routers:/app/routers:ro
      - ./backend/services:/app/services:ro
      - ./backend/workers:/app/workers:ro
      - /tmp/anon-jobs:/anon-jobs
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ANON_JOBS_DIR=/anon-jobs
      - ANON_SECRET_KEY=${ANON_SECRET_KEY:-dev-insecure-key-change-for-prod}
      - PYTHONPATH=/app
    depends_on: [redis]

  worker:
    build:
      context: ..
      dockerfile: web/backend/Dockerfile.dev
    command: celery -A workers.celery_app worker -Q fast,gpu --concurrency 2 --loglevel=info
    volumes:
      - ../src:/app/src:ro
      - ../anon.py:/app/anon.py:ro
      - ./backend/main.py:/app/main.py:ro
      - ./backend/routers:/app/routers:ro
      - ./backend/services:/app/services:ro
      - ./backend/workers:/app/workers:ro
      - /tmp/anon-jobs:/anon-jobs
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ANON_JOBS_DIR=/anon-jobs
      - ANON_SECRET_KEY=${ANON_SECRET_KEY:-dev-insecure-key-change-for-prod}
      - PYTHONPATH=/app
    depends_on: [redis]

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules          # isolate node_modules inside container
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on: [backend]
